<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Organick</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
			rel="stylesheet"
		/>
	</head>
	<body>
		<header class="header">
			<div class="container">
				<div class="header__wrapper">
					<a href="/" class="header__logo"
						><img src="/src/img/logo/Logo.svg" alt="" />Organick</a
					>
					<ul class="header__nav">
						<li class="header__item"><a href="#">Home</a></li>
						<li class="header__item"><a href="#">About</a></li>
						<li class="header__item"><a href="#">Pages</a></li>
						<li class="header__item"><a href="#">Shop</a></li>
						<li class="header__item"><a href="#">Projects</a></li>
						<li class="header__item"><a href="#">News</a></li>
					</ul>
					<div class="header__shopping">
						<div class="header__search">
							<input type="text" class="header__search-input" />
							<button class="header__search-btn">
								<img src="/src/img/logo/search.svg" alt="" />
							</button>
						</div>
						<div class="header__cart">
							<button class="header__cart-btn">
								<img src="/src/img/logo/cart.svg" alt="" />
							</button>
							<a href="#" class="header__cart-link">Cart (0)</a>
						</div>
					</div>
				</div>
			</div>
		</header>

		<script type="module" src="/src/js/script.js"></script>
	</body>
</html>
